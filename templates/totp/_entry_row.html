<tr data-id="{{ e.id }}" data-period="30"
    data-update-url="{% url 'totp:update_group' e.id %}"
    data-rename-url="{% url 'totp:rename_entry' e.id %}">
    <td class="entry-cell-name">
        <div class="d-flex align-items-center gap-2 w-100" style="min-width:0;">
            {% if e.team %}
            <span class="badge rounded-pill bg-primary-subtle text-primary fw-semibold flex-shrink-0">
                {{ e.team.name }}
            </span>
            {% endif %}
            <span class="entry-name flex-grow-1 text-truncate" title="{{ e.name }}">{{ e.name }}</span>
            {% if e.can_manage %}
            <button class="btn btn-sm btn-outline-secondary btn-touch rename-btn" type="button"
                    data-entry-id="{{ e.id }}" data-entry-name="{{ e.name }}"
                    aria-label="重命名 {{ e.name }}" title="重命名">
                <i class="bi bi-pencil-square"></i>
            </button>
            {% endif %}
        </div>
    </td>
    <td class="entry-cell-group">
        {% if e.team %}
        <span class="badge rounded-pill bg-light text-muted fw-semibold">团队共享</span>
        {% else %}
        <select class="form-select form-select-sm group-select" data-current="{{ e.group_id|default_if_none:'' }}"
                {% if not e.can_manage %}disabled{% endif %}>
            <option value="" {% if not e.group_id %}selected{% endif %}>未分组</option>
            {% for g in groups %}
            <option value="{{ g.id }}" {% if e.group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
        </select>
        {% endif %}
    </td>
    <td class="text-nowrap entry-cell-code">
        <span class="badge text-bg-dark code-badge code-text" data-code-placeholder="••••••">••••••</span>
        <button class="btn btn-sm btn-outline-secondary btn-touch copy-btn ms-1" type="button" data-code="" data-label-default="复制" title="复制" aria-label="复制验证码">
            <i class="bi bi-clipboard"></i>
        </button>
        <div class="d-md-none text-muted small mt-1">剩余 <span class="remain-mobile">--s</span></div>
    </td>
    <td class="d-none d-md-table-cell entry-cell-expiry">
        <div class="progress small" role="progressbar">
            <div class="progress-bar" style="width:0%"></div>
        </div>
        <small class="text-muted remain">--s</small>
    </td>
    <td class="text-nowrap entry-cell-actions">
        <div class="d-flex flex-wrap gap-2">
            {% if e.can_manage %}
            <button class="btn btn-sm btn-outline-primary btn-touch share-link-btn" type="button"
                    data-entry-id="{{ e.id }}" data-entry-name="{{ e.name }}"
                    title="生成临时访问链接" aria-label="生成一次性访问链接">
                <i class="bi bi-link-45deg"></i>
            </button>
            <form method="post" action="{% url 'totp:delete' e.id %}">
                {% csrf_token %}
                <button class="btn btn-sm btn-outline-danger btn-touch" type="submit" title="删除"
                        data-confirm="确定删除该密钥吗？"
                        data-confirm-title="删除密钥"
                        data-confirm-ok="删除"
                        data-confirm-variant="danger"
                        data-confirm-hint="此操作会要求你先进行二次确认密码。">
                    <i class="bi bi-trash"></i>
                </button>
            </form>
            {% else %}
            <button class="btn btn-sm btn-outline-secondary disabled" type="button" title="仅管理员可生成链接"
                    disabled>
                <i class="bi bi-link-45deg"></i>
            </button>
            {% endif %}
        </div>
    </td>
</tr>
