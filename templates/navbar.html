<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
            <i class="bi bi-shield-lock-fill text-primary fs-5"></i>
            <span>2FA在线工具</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% if request.user.is_authenticated %}
                {% with current=request.resolver_match.url_name %}
                <li class="nav-item me-2">
                    <a class="nav-link px-3 {% if current == 'list' %}active{% endif %}"
                       href="{% url 'totp:list' %}">我的密钥</a>
                </li>
                <li class="nav-item me-2">
                    <a class="nav-link px-3 {% if current == 'teams' %}active{% endif %}"
                       href="{% url 'totp:teams' %}">团队空间</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 {% if current == 'trash' %}active{% endif %}"
                       href="{% url 'totp:trash' %}">回收站</a>
                </li>
                {% endwith %}
                {% endif %}
            </ul>
            <div class="navbar-actions d-flex flex-column flex-lg-row gap-2 align-items-stretch align-items-lg-center mt-2 mt-lg-0">
                {% if request.user.is_authenticated %}
                <span class="navbar-text small text-muted d-none d-lg-inline">Hi, {{ request.user.username }}</span>
                <a class="btn btn-outline-primary {% if request.resolver_match and request.resolver_match.url_name == 'profile' %}active{% endif %}"
                   href="{% url 'accounts:profile' %}">个人资料</a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-secondary" type="submit">退出</button>
                </form>
                {% else %}
                <a class="btn btn-primary" href="{% url 'accounts:login' %}">登录</a>
                <a class="btn btn-outline-secondary" href="{% url 'accounts:signup' %}">注册</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
