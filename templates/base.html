{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}2FA在线工具,TOTP管理平台,动态验证码助手{% endblock %}</title>
    <meta name="keywords" content="2FA,2fa,2fa在线工具,2FA Auth,2FA live,2FA Code,双重验证工具,2FA在线工具"/>
    <meta name="description" content="免费的TOTP管理平台,动态验证码助手OTP管理平台,2FA在线工具"/>
    <!-- Bootstrap CSS -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}" media="(max-width: 768px)">
    {% block head %}{% endblock %}
</head>
<body>
{% include 'navbar.html' %}
<main class="app-main container">
    {% include 'messages.html' %}
    {% block content %}{% endblock %}
</main>
<footer class="app-footer text-center py-4">
    &copy; {% now "Y" %} GA RealTime
    <a href="https://2fa.97.cx/" target="_blank" rel="noopener"
       class="text-decoration-none">TOTP管理平台，2FA在线工具</a>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="appToastContainer"></div>
<div class="visually-hidden" id="appLiveRegion" aria-live="polite" aria-atomic="true"></div>
<div class="modal fade" id="appConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content border-0 rounded-3 shadow">
            <div class="modal-header">
                <h5 class="modal-title" id="appConfirmTitle">请确认操作</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div id="appConfirmMessage" class="mb-0"></div>
                <div id="appConfirmHint" class="text-muted small mt-2 d-none"></div>
            </div>
            <div class="modal-footer d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="appConfirmCancelBtn">取消</button>
                <button type="button" class="btn btn-danger" id="appConfirmOkBtn">确认</button>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/ui.js' %}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
